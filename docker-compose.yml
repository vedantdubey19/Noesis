version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: noesis-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-noesis}
      POSTGRES_USER: ${POSTGRES_USER:-noesis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noesis}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: noesis-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
